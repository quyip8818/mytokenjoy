services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tokenjoy
      POSTGRES_PASSWORD: tokenjoy
      POSTGRES_DB: tokenjoy
    ports:
      - '5432:5432'
    volumes:
      - tokenjoy_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tokenjoy']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: newapi
      MYSQL_DATABASE: newapi
    ports:
      - '3306:3306'
    volumes:
      - newapi_mysql:/var/lib/mysql

  new-api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
    ports:
      - '3000:3000'
    environment:
      SQL_DSN: root:newapi@tcp(mysql:3306)/newapi?charset=utf8mb4&parseTime=True&loc=Local
      REDIS_CONN_STRING: redis://redis:6379
      SESSION_SECRET: tokenjoy-dev-session-secret
      SYNC_FREQUENCY: 60
      MANAGEMENT_WEBHOOK_URL: http://host.docker.internal:8080/api/internal/webhooks/newapi-log
      MANAGEMENT_WEBHOOK_SECRET: ${NEW_API_WEBHOOK_SECRET:-tokenjoy-webhook-secret}

volumes:
  tokenjoy_pg:
  newapi_mysql:
