services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: tokenjoy
      POSTGRES_PASSWORD: tokenjoy
      POSTGRES_DB: tokenjoy
    ports:
      - '5432:5432'
    volumes:
      - tokenjoy_pg:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tokenjoy -d tokenjoy']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  new-api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - '3000:3000'
    environment:
      SQL_DSN: postgresql://tokenjoy:tokenjoy@postgres:5432/newapi?sslmode=disable
      LOG_SQL_DSN: postgresql://tokenjoy:tokenjoy@postgres:5432/logs?sslmode=disable&search_path=newapi
      REDIS_CONN_STRING: redis://redis:6379
      SESSION_SECRET: tokenjoy-dev-session-secret
      SYNC_FREQUENCY: 60
      MANAGEMENT_WEBHOOK_URL: http://host.docker.internal:8080/api/internal/webhooks/newapi-log
      MANAGEMENT_WEBHOOK_SECRET: ${NEW_API_WEBHOOK_SECRET:-tokenjoy-webhook-secret}

volumes:
  tokenjoy_pg:
