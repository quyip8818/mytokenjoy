<!-- 备份：此文件不被代码引用，实际模板托管在 Resend Dashboard。变量: {{code}} -->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
  </head>
  <body
    style="
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      color: #333;
      background: #f5f5f5;
    "
  >
    <div
      style="
        max-width: 600px;
        margin: 0 auto;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 32px;
      "
    >
      <h2 style="margin: 0 0 8px 0; font-size: 20px; color: #111">验证码</h2>
      <p style="margin: 0 0 24px 0; font-size: 14px; color: #666">
        您正在进行身份验证，请使用以下验证码：
      </p>
      <div
        style="
          background: #f8f9fa;
          border: 1px solid #e5e7eb;
          border-radius: 6px;
          padding: 16px;
          text-align: center;
          margin: 0 0 24px 0;
        "
      >
        <span style="font-size: 32px; font-weight: 700; letter-spacing: 6px; color: #111"
          >{{code}}</span
        >
      </div>
      <p style="margin: 0 0 16px 0; font-size: 13px; color: #999">
        验证码 5 分钟内有效，请勿泄露给他人。
      </p>
      <hr style="border: none; border-top: 1px solid #e5e7eb; margin: 16px 0" />
      <p style="font-size: 12px; color: #bbb; margin: 0">
        此邮件由 TokenJoy 系统自动发送，请勿回复。
      </p>
    </div>
  </body>
</html>
