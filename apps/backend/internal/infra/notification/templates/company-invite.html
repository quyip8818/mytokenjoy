<!-- 备份：此文件不被代码引用，实际模板托管在 Resend Dashboard。变量: {{companyName}} {{inviteCode}} {{inviteUrl}} -->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
  </head>
  <body
    style="
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      color: #333;
      background: #f5f5f5;
    "
  >
    <div
      style="
        max-width: 600px;
        margin: 0 auto;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 32px;
      "
    >
      <h2 style="margin: 0 0 8px 0; font-size: 20px; color: #111">您收到一封邀请</h2>
      <p style="margin: 0 0 24px 0; font-size: 14px; color: #666">
        <strong>{{companyName}}</strong> 邀请您加入 TokenJoy 平台进行团队协作。
      </p>
      <div style="text-align: center; margin: 0 0 24px 0">
        <a
          href="{{inviteUrl}}"
          style="
            display: inline-block;
            background: #111;
            color: #fff;
            text-decoration: none;
            padding: 12px 32px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
          "
        >
          接受邀请
        </a>
      </div>
      <p style="margin: 0 0 8px 0; font-size: 13px; color: #999">或手动输入邀请码：</p>
      <div
        style="
          background: #f8f9fa;
          border: 1px solid #e5e7eb;
          border-radius: 6px;
          padding: 12px;
          text-align: center;
          margin: 0 0 24px 0;
        "
      >
        <code style="font-size: 16px; font-weight: 600; color: #111">{{inviteCode}}</code>
      </div>
      <p style="margin: 0 0 16px 0; font-size: 13px; color: #999">
        此邀请 7 天内有效。如果您不认识发送者，请忽略此邮件。
      </p>
      <hr style="border: none; border-top: 1px solid #e5e7eb; margin: 16px 0" />
      <p style="font-size: 12px; color: #bbb; margin: 0">
        此邮件由 TokenJoy 系统自动发送，请勿回复。
      </p>
    </div>
  </body>
</html>
