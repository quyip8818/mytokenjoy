<!-- 备份：此文件不被代码引用，实际模板托管在 Resend Dashboard。变量: {{nodeName}} {{threshold}} {{currentPct}} {{consumed}} {{budget}} -->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; color: #333; background: #f5f5f5;">
  <div style="max-width: 600px; margin: 0 auto; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 32px;">
    <h2 style="margin: 0 0 8px 0; font-size: 20px; color: #111;">⚠️ 预算预警</h2>
    <p style="margin: 0 0 16px 0; font-size: 14px; color: #666;">以下部门预算使用已达到预警阈值：</p>
    <table style="width: 100%; border-collapse: collapse; margin: 0 0 24px 0; font-size: 14px;">
      <tr>
        <td style="padding: 8px 0; color: #999; width: 100px;">部门</td>
        <td style="padding: 8px 0; color: #111; font-weight: 500;">{{nodeName}}</td>
      </tr>
      <tr>
        <td style="padding: 8px 0; color: #999;">预警阈值</td>
        <td style="padding: 8px 0; color: #111; font-weight: 500;">{{threshold}}%</td>
      </tr>
      <tr>
        <td style="padding: 8px 0; color: #999;">当前使用</td>
        <td style="padding: 8px 0; color: #e74c3c; font-weight: 500;">{{currentPct}}%</td>
      </tr>
      <tr>
        <td style="padding: 8px 0; color: #999;">已消耗</td>
        <td style="padding: 8px 0; color: #111;">¥{{consumed}}</td>
      </tr>
      <tr>
        <td style="padding: 8px 0; color: #999;">总预算</td>
        <td style="padding: 8px 0; color: #111;">¥{{budget}}</td>
      </tr>
    </table>
    <p style="margin: 0 0 16px 0; font-size: 13px; color: #999;">建议您及时查看并调整预算分配。</p>
    <hr style="border: none; border-top: 1px solid #e5e7eb; margin: 16px 0;">
    <p style="font-size: 12px; color: #bbb; margin: 0;">此邮件由 TokenJoy 通知系统自动发送。</p>
  </div>
</body>
</html>
