name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: tokenjoy
          POSTGRES_PASSWORD: tokenjoy
          POSTGRES_DB: tokenjoy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tokenjoy -d tokenjoy"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - run: pnpm install --frozen-lockfile

      - name: Verify
        env:
          DATABASE_URL: postgres://tokenjoy:tokenjoy@localhost:5432/tokenjoy?sslmode=disable
          SESSION_SECRET: tokenjoy-dev-session-secret
          COMPANY_NAME: Demo Company
        run: pnpm verify
